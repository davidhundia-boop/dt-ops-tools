<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Link Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #5b6af4;
      --accent-hover: #4a59e8;
      --accent-light: rgba(91,106,244,0.12);
      --success: #34d399;
      --success-bg: rgba(52,211,153,0.1);
      --warning: #fbbf24;
      --warning-bg: rgba(251,191,36,0.1);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.1);
      --text: #e2e8f0;
      --text-muted: #8892b0;
      --text-dim: #4a5568;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc, #5b6af4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.82rem;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    textarea { min-height: 110px; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 560px) {
      .field-row { grid-template-columns: 1fr; }
    }

    .field-group { margin-bottom: 18px; }
    .field-group:last-child { margin-bottom: 0; }

    .hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.99); }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--success); color: var(--success); }

    .alert {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .alert-icon { flex-shrink: 0; margin-top: 1px; font-size: 1rem; }

    .alert-error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
    .alert-warning { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
    .alert-success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
    .alert-info { background: var(--accent-light); border: 1px solid var(--accent); color: #a5b4fc; }

    .hidden { display: none !important; }

    #output-section { margin-top: 4px; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .badge-legacy { background: rgba(251,191,36,0.15); color: var(--warning); border: 1px solid rgba(251,191,36,0.3); }
    .badge-odt { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
    .badge-hashed { background: var(--accent-light); color: #a5b4fc; border: 1px solid rgba(91,106,244,0.3); }

    .output-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    .param-changed { color: var(--success); font-weight: 600; }

    .changes-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .change-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .change-item .tick { color: var(--success); }
    .change-item code {
      font-family: 'Consolas', monospace;
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--text);
      font-size: 0.78rem;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tracking Link Builder</h1>
      <p>Paste a raw tracking link, enter your device ID, and get a test-ready output.</p>
    </header>

    <!-- Input Card -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>Input</div>

      <div class="field-group">
        <label for="tracking-input">Raw Tracking Link</label>
        <textarea id="tracking-input" placeholder="https://app.appsflyer.com/com.example.app?pid=appia_int&clickid=[ClickID]&..."></textarea>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="device-id">Your Device ID (GAID / AAID)</label>
          <input type="text" id="device-id" placeholder="278d8c12-bdfc-4843-a4cd-043631edab0a" />
          <div class="hint">Raw UUID or already-hashed SHA1 value.</div>
        </div>
        <div class="field-group">
          <label for="requester-name">Your Name</label>
          <input type="text" id="requester-name" placeholder="e.g. David" />
          <div class="hint">Click ID will be generated as <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:0.75rem;">name + random number</code></div>
        </div>
      </div>

      <button class="btn-primary" onclick="buildLink()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        Build Link
      </button>
    </div>

    <!-- Output Card -->
    <div class="card hidden" id="output-section">
      <div class="card-title"><span class="dot"></span>Output</div>

      <div id="alert-container"></div>

      <div class="output-header">
        <div class="badges" id="badges"></div>
        <button class="btn-copy" id="copy-btn" onclick="copyLink()">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>

      <div class="output-box" id="output-box"></div>

      <div class="changes-list" id="changes-list"></div>
    </div>
  </div>

  <script>
    // ── SHA-1 via Web Crypto API ──────────────────────────────────────────────
    async function sha1(str) {
      const encoder = new TextEncoder();
      const data = encoder.encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-1', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── Detectors ─────────────────────────────────────────────────────────────
    function isUUID(str) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(str.trim());
    }

    function isSHA1Hash(str) {
      return /^[0-9a-f]{40}$/i.test(str.trim());
    }

    function isODT(pid) {
      return pid === 'onedigitalturbine_int';
    }

    // ── Alert helpers ─────────────────────────────────────────────────────────
    function makeAlert(type, icon, message) {
      return `<div class="alert alert-${type}"><span class="alert-icon">${icon}</span><span>${message}</span></div>`;
    }

    // ── Main builder ──────────────────────────────────────────────────────────
    async function buildLink() {
      const rawLink   = document.getElementById('tracking-input').value.trim();
      const deviceId  = document.getElementById('device-id').value.trim();
      const requesterName = document.getElementById('requester-name').value.trim();
      const clickIdVal = requesterName
        ? requesterName.toLowerCase() + (Math.floor(Math.random() * 90) + 10)
        : 'test' + (Math.floor(Math.random() * 90) + 10);

      const outputSection = document.getElementById('output-section');
      const alertContainer = document.getElementById('alert-container');
      const outputBox  = document.getElementById('output-box');
      const changesList = document.getElementById('changes-list');
      const badgesEl   = document.getElementById('badges');

      // Reset
      alertContainer.innerHTML = '';
      outputBox.innerHTML = '';
      changesList.innerHTML = '';
      badgesEl.innerHTML = '';
      outputSection.classList.remove('hidden');

      // ── Validate input ────────────────────────────────────────────────────
      if (!rawLink) {
        alertContainer.innerHTML = makeAlert('error', '⚠️', 'Please paste a tracking link first.');
        return;
      }
      if (!deviceId) {
        alertContainer.innerHTML = makeAlert('error', '⚠️', 'Please enter your Device ID (GAID/AAID).');
        return;
      }

      let url;
      try { url = new URL(rawLink); }
      catch {
        alertContainer.innerHTML = makeAlert('error', '⚠️', 'The tracking link does not appear to be a valid URL. Make sure it starts with <code>https://</code>.');
        return;
      }

      const params = new URLSearchParams(url.search);
      const pid    = params.get('pid') || '';
      const integrationIsODT = isODT(pid);
      const changes = [];

      // ── Determine hashing requirement ─────────────────────────────────────
      let resolvedDeviceId = deviceId;

      // Collect all param names that contain "sha1" in the key
      let sha1Params = [...params.keys()].filter(k => k.toLowerCase().includes('sha1'));

      // Kochava: hashing signalled by device_id_is_hashed=true + device_hash_method=sha1
      const kochavaHashed =
        (params.get('device_id_is_hashed') || '').toLowerCase() === 'true' &&
        (params.get('device_hash_method') || '').toLowerCase() === 'sha1';
      if (kochavaHashed && !sha1Params.includes('device_id')) {
        sha1Params = [...sha1Params, 'device_id'];
      }

      if (sha1Params.length > 0) {
        // sha1 required
        if (isSHA1Hash(deviceId)) {
          // Already hashed — use as-is
          resolvedDeviceId = deviceId.trim().toLowerCase();
        } else if (isUUID(deviceId)) {
          // Need to hash the UUID
          try {
            resolvedDeviceId = await sha1(deviceId.trim().toLowerCase());
            alertContainer.innerHTML += makeAlert('info', 'ℹ️', `Your Device ID was automatically SHA-1 hashed to: <strong>${resolvedDeviceId}</strong>`);
          } catch {
            alertContainer.innerHTML += makeAlert('error', '⚠️', 'Could not hash your Device ID. Please provide an already-hashed SHA-1 value (40 hex characters).');
            return;
          }
        } else {
          alertContainer.innerHTML += makeAlert('warning', '⚠️', `The tracking link requires a <strong>SHA-1 hashed</strong> Device ID, but the value you entered doesn't look like a standard UUID or SHA-1 hash. Provide either a UUID (e.g. <code>278d8c12-bdfc-4843-a4cd-043631edab0a</code>) or a 40-character hex hash.`);
          return;
        }
      } else {
        // No sha1 param — use raw device ID (UUID expected)
        if (!isUUID(deviceId) && !isSHA1Hash(deviceId)) {
          alertContainer.innerHTML += makeAlert('warning', '⚠️', 'The Device ID format looks unexpected. Continuing anyway — verify the output.');
        }
        resolvedDeviceId = deviceId.trim();
      }

      // ── Shared helper: find the click ID param (clickid / click_id / ~click_id) ──
      const clickIdKey = [...params.keys()].find(k => {
        const kl = k.toLowerCase();
        return kl === 'clickid' || kl === 'click_id' || kl === '~click_id';
      }) || null;

      // ── Apply rules ───────────────────────────────────────────────────────
      if (!integrationIsODT) {
        // ── LEGACY INTEGRATION ────────────────────────────────────────────

        // 1. Replace clickid / click_id
        if (clickIdKey) {
          params.set(clickIdKey, clickIdVal);
          changes.push({ param: clickIdKey, value: clickIdVal, desc: 'Test click ID' });
        }

        // 2. Replace all sha1_* advertising ID params
        for (const key of sha1Params) {
          params.set(key, resolvedDeviceId);
          changes.push({ param: key, value: resolvedDeviceId, desc: 'Hashed Device ID (SHA-1)' });
        }

        // 3. Replace plain advertising ID params (non-sha1) if sha1 params were absent
        if (sha1Params.length === 0) {
          const plainAdIds = ['advertising_id', 'android_id', 'device_id', 'idfa', 'gaid', 'aaid', '$aaid', 'af_idfa', 'af_android_id']
            .filter(k => params.has(k));
          for (const key of plainAdIds) {
            params.set(key, resolvedDeviceId);
            changes.push({ param: key, value: resolvedDeviceId, desc: 'Raw Device ID' });
          }
        }

      } else {
        // ── ONE DIGITAL TURBINE (ODT) ─────────────────────────────────────

        // 1. Replace clickid / click_id
        if (clickIdKey) {
          params.set(clickIdKey, clickIdVal);
          changes.push({ param: clickIdKey, value: clickIdVal, desc: 'Test click ID' });
        }

        // 2. Replace all sha1_* advertising ID params (same as Legacy)
        for (const key of sha1Params) {
          params.set(key, resolvedDeviceId);
          changes.push({ param: key, value: resolvedDeviceId, desc: 'Hashed Device ID (SHA-1)' });
        }

        // 3. Replace plain advertising ID params if sha1 params were absent
        if (sha1Params.length === 0) {
          const plainAdIds = ['advertising_id', 'android_id', 'device_id', 'idfa', 'gaid', 'aaid', '$aaid', 'af_idfa', 'af_android_id']
            .filter(k => params.has(k));
          for (const key of plainAdIds) {
            params.set(key, resolvedDeviceId);
            changes.push({ param: key, value: resolvedDeviceId, desc: 'Raw Device ID' });
          }
        }
      }

      // ── id2 → Unified hardcode (always, regardless of integration type) ──────
      if (params.has('id2')) {
        const currentId2 = params.get('id2');
        const isDSP = currentId2.includes('{');
        const id2Val = isDSP ? 'ckFCRVBW' : 'dV9XX0xY';
        const id2Type = isDSP ? 'DSP' : 'ODS';
        params.set('id2', id2Val);
        changes.push({ param: 'id2', value: id2Val, desc: `Unified id2 hardcoded (${id2Type})` });
      }

      // ── Reconstruct URL ───────────────────────────────────────────────────
      const finalUrl = `${url.origin}${url.pathname}?${params.toString()}`;

      // ── Render output with highlights ─────────────────────────────────────
      const changedKeys = new Set(changes.map(c => c.param));
      let highlighted = '';
      const base = `${url.origin}${url.pathname}?`;
      highlighted += escapeHtml(base);

      const paramParts = [];
      for (const [k, v] of params.entries()) {
        if (changedKeys.has(k)) {
          paramParts.push(`<span class="param-changed">${escapeHtml(k)}=${escapeHtml(v)}</span>`);
        } else {
          paramParts.push(escapeHtml(`${k}=${v}`));
        }
      }
      highlighted += paramParts.join('&amp;');

      outputBox.innerHTML = highlighted;

      // ── Badges ────────────────────────────────────────────────────────────
      const integrationLabel = integrationIsODT ? 'OneDigitalTurbine' : 'Legacy';
      const integrationClass = integrationIsODT ? 'badge-odt' : 'badge-legacy';
      badgesEl.innerHTML = `<span class="badge ${integrationClass}">${integrationLabel}</span>`;
      if (params.has('id2')) {
        const id2Change = changes.find(c => c.param === 'id2');
        const id2Type = id2Change ? id2Change.desc.match(/\((\w+)\)/)?.[1] || 'Unified' : 'Unified';
        badgesEl.innerHTML += `<span class="badge badge-odt">Unified (${id2Type})</span>`;
      }
      if (pid) badgesEl.innerHTML += `<span class="badge badge-legacy" style="background:rgba(139,148,158,0.1);color:#8b94a0;border-color:rgba(139,148,158,0.2);">pid: ${escapeHtml(pid)}</span>`;
      if (sha1Params.length > 0) badgesEl.innerHTML += `<span class="badge badge-hashed">SHA-1 Hashed</span>`;

      // ── Changes summary ───────────────────────────────────────────────────
      if (changes.length > 0) {
        changesList.innerHTML = changes.map(c =>
          `<div class="change-item"><span class="tick">✓</span> <code>${escapeHtml(c.param)}</code> → <code>${escapeHtml(c.value)}</code> <span style="color:var(--text-dim);font-size:0.75rem;">${escapeHtml(c.desc)}</span></div>`
        ).join('');
      } else {
        changesList.innerHTML = `<div class="change-item" style="color:var(--text-dim);">No parameters were modified.</div>`;
      }
    }

    // ── Copy to clipboard ─────────────────────────────────────────────────────
    async function copyLink() {
      const params = new URLSearchParams();
      // Re-parse from the displayed output — easier: just grab the text
      const text = document.getElementById('output-box').innerText;
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        }, 2000);
      } catch {
        alert('Copy failed — please select and copy the link manually.');
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Allow Ctrl+Enter to build
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') buildLink();
    });
  </script>
</body>
</html>
